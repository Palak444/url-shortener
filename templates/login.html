<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            margin: 0;
        }

        /* 🔵 NAVBAR */
        .navbar {
            background: #1976d2;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-weight: bold;
        }

        /* 🔵 CONTAINER */
        .container {
            background: #2196f3;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
            color: white;
            margin: 80px auto;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }

        button {
            background: white;
            color: #2196f3;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .message {
            background: white;
            color: black;
            padding: 8px;
            border-radius: 5px;
            margin-top: 10px;
        }

        a.link {
            color: white;
            display: block;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div><b>URL Shortener</b></div>
    <div>
        <a href="/login">Login</a>
        <a href="/signup">Signup</a>
    </div>
</div>

<div class="container">
    <h2>Login</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    {% if message %}
        <div class="message">{{ message }}</div>
    {% endif %}

    <a class="link" href="/signup">Create account</a>
</div>

</body>
</html>
