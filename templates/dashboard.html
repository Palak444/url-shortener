<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - URL Shortener</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            margin: 0;
        }

        /* 🔵 NAVBAR */
        .navbar {
            background: #1976d2;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-weight: bold;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        /* 🔵 CONTAINER & TABLE */
        .container {
            width: 80%;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th, td {
            padding: 12px;
            text-align: left;
        }

        th {
            background: #1976d2;
            color: white;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        a.link {
            color: #1976d2;
            text-decoration: none;
            font-weight: bold;
        }

        a.link:hover {
            text-decoration: underline;
        }

        button.delete-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button.delete-btn:hover {
            background: #d32f2f;
        }

        /* 🔵 CHART */
        #clickChart {
            margin-top: 40px;
            width: 100%;
            height: 300px;
        }
    </style>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        window.onload = function() {
            const ctx = document.getElementById('clickChart').getContext('2d');
            const chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [{% for url in urls %}'{{ url.short_code }}',{% endfor %}],
                    datasets: [{
                        label: 'Clicks',
                        data: [{% for url in urls %}{{ url.visits }},{% endfor %}],
                        backgroundColor: '#1976d2'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false },
                        title: {
                            display: true,
                            text: 'Clicks per Short URL'
                        }
                    }
                }
            });
        };
    </script>
</head>
<body>

<!-- 🔵 NAVBAR -->
<div class="navbar">
    <div><b>URL Shortener</b></div>
    <div>
        <span>👤 {{ username }}</span>
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<!-- 🔵 MAIN CONTENT -->
<div class="container">
    <h2>Dashboard</h2>

    <!-- 🔵 TABLE -->
    <table>
        <tr>
            <th>Code</th>
            <th>Full URL</th>
            <th>Clicks</th>
            <th>Action</th>
        </tr>
        {% for url in urls %}
        <tr>
            <td>{{ url.short_code }}</td>
            <td><a class="link" href="{{ url.original_url }}" target="_blank">{{ url.original_url }}</a></td>
            <td>{{ url.visits }}</td>
            <td>
                <button class="delete-btn" onclick="window.location.href='/delete/{{ url.short_code }}'">Delete</button>
            </td>
        </tr>
        {% endfor %}
    </table>

    <!-- 🔵 CHART -->
    <canvas id="clickChart"></canvas>
</div>

</body>
</html>
